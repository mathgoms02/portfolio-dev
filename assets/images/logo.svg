<svg width="200" height="80" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
      
      .logo-text {
        font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
        font-size: 48px;
        font-weight: 700;
        letter-spacing: -3px; /* Deixa o texto mais juntinho */
      }
      
      /* Paleta de Cores Cyberpunk/Terminal Moderno */
      .tag { fill: #FF007A; } /* Rosa Neon */
      .name { fill: #00F0FF; } /* Ciano Neon */
      .dot { fill: #FFFFFF; } /* Branco */
    </style>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="dev-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="100%" height="100%" rx="16" fill="#0B0C10" />
  
  <rect x="0" y="0" width="100%" height="100%" rx="16" fill="url(#dev-grid)" />

  <rect x="1" y="1" width="398" height="100" rx="15" fill="none" stroke="#1F2833" stroke-width="2" />

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="logo-text">
    <tspan class="tag">&lt;</tspan>
    <tspan class="name">math.goms</tspan>
    <tspan class="tag">/&gt;</tspan>
  </text>

  <path d="M 130 115 L 270 115" stroke="#00F0FF" stroke-width="4" stroke-linecap="round" opacity="0.8" filter="url(#neon-glow)"/>
  <path d="M 170 125 L 230 125" stroke="#FF007A" stroke-width="2" stroke-linecap="round" opacity="0.6" filter="url(#neon-glow)"/>
</svg>
